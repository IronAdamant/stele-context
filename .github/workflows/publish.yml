name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# PyPI Trusted Publishing: short-lived OIDC token from GitHub — no PYPI_API_TOKEN secret.
# One-time: pypi.org → project → Publishing → add trusted publisher (GitHub + this repo + publish.yml).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
